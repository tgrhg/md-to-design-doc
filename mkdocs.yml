site_name: Design Docs
site_description: Markdown と UML で管理する設計書ポータル
site_url: ""
docs_dir: docs
site_dir: site
use_directory_urls: false

repo_url: https://github.com/example/md-to-design-doc
repo_name: md-to-design-doc

theme:
  name: material
  language: ja
  icon:
    logo: material/file-document-outline
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: ja

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

hooks:
  - hooks/plantuml.py

extra_css:
  - stylesheets/design-docs.css

extra_javascript:
  - javascripts/version-sidebar.js

nav:
  - ホーム: index.md
  - サンプル EC サービス設計書: architecture/sample-ec-service.md
  - 設計書運用ガイド:
      - 設計書の変更・管理ガイド: guides/design-doc-management.md
      - ドキュメント生成の仕組み: guides/documentation-generation.md
      - MkDocs Material 便利機能サンプル: guides/mkdocs-material-cheatsheet.md
  - PR 時の視覚確認方針: pr-visual-review.md
  - 設計書のバージョン管理: versioning.md
