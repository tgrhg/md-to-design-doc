name: design-docs-pages

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  NODE_VERSION: '22'
  PAGES_BRANCH: gh-pages
  PREVIEW_ROOT: previews

concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Capture build time
        run: echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Build design docs
        run: npm test
      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: design-docs-site
          path: site

  deploy-production:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download built site artifact
        uses: actions/download-artifact@v4
        with:
          name: design-docs-site
          path: site
      - name: Publish production site to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.PAGES_BRANCH }}
          folder: site
          clean: true
          clean-exclude: ${{ env.PREVIEW_ROOT }}
          commit-message: 'Deploy production docs from ${{ github.sha }}'

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built site artifact
        uses: actions/download-artifact@v4
        with:
          name: design-docs-site
          path: site
      - name: Publish PR preview to gh-pages subpath
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ env.PAGES_BRANCH }}
          publish_dir: ./site
          destination_dir: ${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}
          keep_files: true
          full_commit_message: 'Deploy PR #${{ github.event.pull_request.number }} preview from ${{ github.event.pull_request.head.sha }}'
      - name: Register PR preview version
        uses: actions/github-script@v7
        env:
          PREVIEW_ROOT: ${{ env.PREVIEW_ROOT }}
          PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoPath = repo === `${owner}.github.io` ? '' : `/${repo}`;
            const previewUrl = `https://${owner}.github.io${repoPath}/${process.env.PREVIEW_ROOT}/pr-${context.issue.number}/`;
            const manifestPath = `${process.env.PREVIEW_ROOT}/versions.json`;
            const metadata = JSON.parse(fs.readFileSync('site/version.json', 'utf8'));
            let sha;
            let manifest = { updatedAt: new Date().toISOString(), previews: [] };
            try {
              const { data } = await github.rest.repos.getContent({
                owner,
                repo,
                path: manifestPath,
                ref: process.env.PAGES_BRANCH,
              });
              sha = data.sha;
              manifest = JSON.parse(Buffer.from(data.content, data.encoding).toString('utf8'));
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const previews = (manifest.previews || []).filter((preview) => preview.prNumber !== context.issue.number);
            previews.unshift({
              kind: 'pr-preview',
              prNumber: context.issue.number,
              title: context.payload.pull_request.title,
              url: previewUrl,
              docVersion: metadata.docVersion,
              refName: metadata.refName,
              sha: metadata.sha,
              shortSha: metadata.shortSha,
              buildTime: metadata.buildTime,
              updatedAt: new Date().toISOString(),
            });
            const body = JSON.stringify({ updatedAt: new Date().toISOString(), previews }, null, 2) + '\n';
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: manifestPath,
              branch: process.env.PAGES_BRANCH,
              message: `Register PR #${context.issue.number} preview version`,
              content: Buffer.from(body).toString('base64'),
              sha,
            });
      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_ROOT: ${{ env.PREVIEW_ROOT }}
          PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoPath = repo === `${owner}.github.io` ? '' : `/${repo}`;
            const previewUrl = `https://${owner}.github.io${repoPath}/${process.env.PREVIEW_ROOT}/pr-${context.issue.number}/`;
            const versionsUrl = `https://${owner}.github.io${repoPath}/`;
            const marker = '<!-- design-docs-preview-url -->';
            const body = [
              marker,
              '### Design Docs Preview',
              '',
              'PR の HTML はダウンロード不要で確認できます。',
              '',
              `🔎 **Preview:** ${previewUrl}`,
              `📚 **Version index:** ${versionsUrl}`,
              '',
              `- Production はルート URL のまま維持し、この PR は \`/${process.env.PREVIEW_ROOT}/pr-${context.issue.number}/\` に別バージョンとして公開します。`,
              `- メインページの「公開済みバージョン」から、この PR preview にもたどれるように \`/${process.env.PREVIEW_ROOT}/versions.json\` を更新します。`,
              `- GitHub Pages の公開元は **Deploy from a branch / \`${process.env.PAGES_BRANCH || 'gh-pages'}\` / root** に設定してください。`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const previous = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body });
            }

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Prepare empty preview directory
        run: mkdir -p empty-preview
      - name: Remove PR preview subpath
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ env.PAGES_BRANCH }}
          publish_dir: ./empty-preview
          destination_dir: ${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}
          keep_files: true
          full_commit_message: 'Remove PR #${{ github.event.pull_request.number }} preview'
      - name: Unregister PR preview version
        uses: actions/github-script@v7
        env:
          PREVIEW_ROOT: ${{ env.PREVIEW_ROOT }}
          PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const manifestPath = `${process.env.PREVIEW_ROOT}/versions.json`;
            let data;
            try {
              ({ data } = await github.rest.repos.getContent({
                owner,
                repo,
                path: manifestPath,
                ref: process.env.PAGES_BRANCH,
              }));
            } catch (error) {
              if (error.status === 404) return;
              throw error;
            }
            const manifest = JSON.parse(Buffer.from(data.content, data.encoding).toString('utf8'));
            const previews = (manifest.previews || []).filter((preview) => preview.prNumber !== context.issue.number);
            const body = JSON.stringify({ updatedAt: new Date().toISOString(), previews }, null, 2) + '\n';
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: manifestPath,
              branch: process.env.PAGES_BRANCH,
              message: `Unregister PR #${context.issue.number} preview version`,
              content: Buffer.from(body).toString('base64'),
              sha: data.sha,
            });
